# Conda environment for RLWM Trauma Analysis (GPU-accelerated)
# For use on GPU clusters like Monash M3 with NVIDIA GPUs
#
# Usage:
#   # On M3 cluster:
#   module load miniforge3
#   mamba env create -f environment_gpu.yml
#   conda activate rlwm_gpu
#
# Or use the setup script:
#   bash cluster/setup_env_gpu.sh
#
# Note: CUDA module is NOT required for env creation. JAX pip packages bundle
# their own CUDA libraries. The GPU driver is accessed via the cluster's
# NVIDIA kernel module (automatically available on GPU nodes).
#
# GPU support uses JAX with CUDA backend for accelerated optimization.
# The CPU environment (environment.yml) is recommended for development.

name: rlwm_gpu
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Data processing
  - pandas>=2.0.0
  - numpy>=2.0.0

  # Progress bars and utilities
  - tqdm
  - psutil
  - joblib>=1.3.0

  # Analysis and visualization
  - matplotlib>=3.0.0
  - seaborn>=0.13.0
  - scipy>=1.0.0
  - scikit-learn>=1.0.0
  - statsmodels>=0.14.0

  # Note: Do NOT install cuda-nvcc or other CUDA packages via conda.
  # JAX's pip packages bundle compatible CUDA libraries (cuSPARSE, cuBLAS, etc.)
  # Mixing conda and pip CUDA causes library conflicts.

  # pip dependencies
  - pip
  - pip:
    # JAX with CUDA 12 support
    # This installs jaxlib + all required CUDA runtime libraries:
    # nvidia-cublas-cu12, nvidia-cusparse-cu12, nvidia-cudnn-cu12, etc.
    - jax[cuda12]>=0.5.0
    - jaxopt>=0.8.3
