[pytest]
# Test discovery — Phase 31 consolidated layout (tests/{unit,integration,scientific})
# Before Phase 31: testpaths = tests scripts/fitting/tests validation
# After Phase 31: all tests live under tests/
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Make repo root importable (so `import scripts.fitting.numpyro_models` resolves
# without requiring `python -m pytest` invocation form).
pythonpath = .

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    scientific: marks tests as scientific-validation tests (slow, deselect with '-m "not scientific"')

# Default options
addopts =
    -v
    --strict-markers
    --tb=short
    --durations=10

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts =
#     --cov=models
#     --cov=fitting
#     --cov=environments
#     --cov-report=html
#     --cov-report=term-missing

# Ignore warnings from external packages
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 3.8
