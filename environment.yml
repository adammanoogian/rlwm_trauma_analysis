# Conda environment for RLWM Trauma Analysis
# Cross-platform (works on Linux clusters)
#
# Usage:
#   conda env create -f environment.yml
#   conda activate rlwm
#
# Or with mamba (faster):
#   mamba env create -f environment.yml

name: rlwm
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Data processing
  - pandas>=2.0.0
  - numpy>=2.0.0

  # JAX ecosystem (CPU version - cluster compatible)
  - jax>=0.4.0
  - jaxlib>=0.4.0

  # Progress bars and utilities
  - tqdm
  - psutil

  # Analysis and visualization
  - matplotlib>=3.0.0
  - seaborn>=0.13.0
  - scipy>=1.0.0
  - scikit-learn>=1.0.0
  - statsmodels>=0.14.0

  # pip dependencies (not available via conda)
  - pip
  - pip:
    - jaxopt>=0.8.0
