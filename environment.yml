# Conda environment for RLWM Trauma Analysis
# Cross-platform (works on Linux clusters)
#
# Usage:
#   conda env create -f environment.yml
#   conda activate rlwm
#
# Or with mamba (faster):
#   mamba env create -f environment.yml

name: rlwm
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Data processing
  - pandas>=2.0.0
  - numpy>=2.0.0

  # Progress bars and utilities
  - tqdm
  - psutil
  - joblib>=1.3.0

  # Analysis and visualization
  - matplotlib>=3.0.0
  - seaborn>=0.13.0
  - scipy>=1.0.0
  - scikit-learn>=1.0.0
  - statsmodels>=0.14.0

  # pip dependencies
  - pip
  - pip:
    # JAX ecosystem (from PyPI for latest versions with memory optimizations)
    # NOTE: conda-forge JAX lags behind PyPI - v0.6.2 vs v0.9.0
    # JAX 0.9.0 has critical XLA compiler improvements that reduce memory usage
    - jax==0.9.0
    - jaxlib==0.9.0
    - jaxopt>=0.8.0
